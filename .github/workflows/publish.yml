name: Publish

on:
  release:
    # Run on full releases AND pre-releases (e.g. *-beta.N). GitHub fires
    # `released` only for non-prerelease releases and `prereleased` for
    # pre-releases, so both are needed to publish betas.
    types: [released, prereleased]
  # Allow publishing manually from the Actions tab (pick the branch/tag to
  # build) without having to (re)create a GitHub release.
  workflow_dispatch:

jobs:
  publish:
    name: Release build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 11

        # Builds + signs the release AAR (with sources/javadoc jars), uploads
        # to the Sonatype Central Portal, and auto-releases the deployment.
      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --max-workers 1 --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
